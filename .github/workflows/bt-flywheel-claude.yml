name: Braintrust Flywheel Claude

# Claude Code example harness — call this from your repo to run the self-improvement cycle.
#
# Minimal caller example:
#
#   jobs:
#     flywheel:
#       uses: dpguthrie/flywheel-plugin/.github/workflows/bt-flywheel-claude.yml@main
#       with:
#         project_name: my-project
#         system_context: |
#           Describe your agent here: architecture, eval files, key metrics, file locations.
#         code_paths: src/ evals/ scorers.py
#       secrets: inherit
#
# See examples/flywheel-caller.yml for a full annotated example.

on:
  workflow_call:
    inputs:

      project_name:
        description: "Braintrust project name for the agent under improvement"
        required: true
        type: string

      system_context:
        description: >
          Description of your agent system passed as context to the flywheel prompt.
          Include: architecture overview, eval file paths, key metric names, and where
          agent code lives. The more specific, the better the flywheel will perform.
        required: true
        type: string

      code_paths:
        description: >
          Space-separated file/directory paths to watch for changes (used in git add).
          Example: "src/ evals/ scorers.py"
          If empty, no files are staged and no PR is opened. Set this explicitly
          to avoid staging output files, logs, downloaded skills, or unrelated changes.
        required: false
        type: string
        default: ""

      act_mode:
        description: >
          Follow-up action policy after the flywheel run: auto, pr, issue, summary, or none.
          auto honors bt-flywheel-summary.json recommended_actions and falls back to a PR
          only when code_paths produced staged changes.
        required: false
        type: string
        default: "auto"

      base_branch:
        description: "Base branch for pull requests"
        required: false
        type: string
        default: "main"

      issue_labels:
        description: "Comma-separated labels for GitHub issues created by act_mode=auto or issue"
        required: false
        type: string
        default: ""

      extra_env:
        description: >
          Additional KEY=VALUE lines written to .env before running the flywheel.
          Use this for non-standard API keys and project-specific env vars.
          Values from ${{ secrets.FOO }} are masked in logs by GitHub Actions.
          Example:
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            BRAINTRUST_GATEWAY_URL=https://gateway.braintrust.dev
        required: false
        type: string
        default: ""

      timeout_minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 90

      setup_python:
        description: "Install Python and run python_install_cmd before the flywheel"
        required: false
        type: boolean
        default: false

      python_version:
        description: "Python version to install (only used when setup_python is true)"
        required: false
        type: string
        default: "3.12"

      python_install_cmd:
        description: "Command to install Python dependencies (only used when setup_python is true)"
        required: false
        type: string
        default: "uv sync"

      setup_node:
        description: "Install Node.js and run node_install_cmd before the flywheel"
        required: false
        type: boolean
        default: false

      node_version:
        description: "Node.js version to install (only used when setup_node is true)"
        required: false
        type: string
        default: "20"

      node_install_cmd:
        description: "Command to install Node.js dependencies (only used when setup_node is true)"
        required: false
        type: string
        default: "npm install"

    secrets:
      ANTHROPIC_API_KEY:
        required: true
      BRAINTRUST_API_KEY:
        required: true

jobs:
  flywheel:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Optional: Python setup ──────────────────────────────────────────────

      - name: Install uv
        if: inputs.setup_python && contains(inputs.python_install_cmd, 'uv')
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        if: inputs.setup_python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install Python dependencies
        if: inputs.setup_python
        run: ${{ inputs.python_install_cmd }}

      # ── Optional: Node.js setup ─────────────────────────────────────────────

      - name: Set up Node.js
        if: inputs.setup_node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install Node.js dependencies
        if: inputs.setup_node
        run: ${{ inputs.node_install_cmd }}

      # ── Flywheel tooling ────────────────────────────────────────────────────

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Braintrust CLI
        run: |
          curl -fsSL https://bt.dev/cli/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install bt-flywheel plugin skill
        run: |
          BASE="https://raw.githubusercontent.com/dpguthrie/flywheel-plugin/main/skills/bt-flywheel"
          mkdir -p .claude/skills/bt-flywheel/references .claude/skills/bt-flywheel/scripts
          curl -fsSL "${BASE}/SKILL.md" -o .claude/skills/bt-flywheel/SKILL.md
          for f in bt-eval-patterns bt-flywheel-output-templates bt-functions-patterns bt-sql-patterns bt-sync-patterns bt-topics-patterns bt-view-patterns; do
            curl -fsSL "${BASE}/references/${f}.md" \
              -o ".claude/skills/bt-flywheel/references/${f}.md" 2>/dev/null || true
          done
          curl -fsSL "${BASE}/scripts/bt-curate-patterns.py" \
            -o ".claude/skills/bt-flywheel/scripts/bt-curate-patterns.py" 2>/dev/null || true

      # ── Environment ─────────────────────────────────────────────────────────

      - name: Write .env
        run: |
          cat >> .env << 'EOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          BRAINTRUST_API_KEY=${{ secrets.BRAINTRUST_API_KEY }}
          BRAINTRUST_DEFAULT_PROJECT=${{ inputs.project_name }}
          ${{ inputs.extra_env }}
          EOF

      # ── Run the flywheel ────────────────────────────────────────────────────

      - name: Run flywheel optimization cycle
        id: flywheel
        run: |
          claude --print --dangerously-skip-permissions \
            -p "$FLYWHEEL_PROMPT" \
            2>&1 | tee flywheel-output.log
        env:
          FLYWHEEL_PROMPT: |
            Invoke the Skill tool with skill='bt-flywheel' to run the full self-improvement
            optimization cycle in autonomous CI mode.

            ${{ inputs.system_context }}

            When complete, ensure bt-flywheel-summary.json and bt-flywheel-narrative.md
            are both written to the working directory, and include recommended_actions in
            bt-flywheel-summary.json for any downstream PR, issue, Slack, Jira, or Linear action.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          BRAINTRUST_DEFAULT_PROJECT: ${{ inputs.project_name }}
          CI: "true"
          FLYWHEEL_AUTONOMOUS: "true"

      # ── Change detection ────────────────────────────────────────────────────

      - name: Detect code changes
        id: changes
        env:
          CODE_PATHS: ${{ inputs.code_paths }}
        run: |
          PATHS="$CODE_PATHS"
          if [ -n "$PATHS" ]; then
            git add -- $PATHS
          else
            echo "code_paths is empty; not staging any files. Set code_paths to enable PR creation."
          fi
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff --cached --stat
          fi

      # ── Outputs ─────────────────────────────────────────────────────────────

      - name: Prepare narrative
        id: narrative
        if: always()
        run: |
          if [ -f bt-flywheel-narrative.md ]; then
            cp bt-flywheel-narrative.md /tmp/narrative.md
          elif [ -f bt-flywheel-summary.json ]; then
            echo "*(Narrative not generated — see bt-flywheel-summary.json artifact)*" > /tmp/narrative.md
            echo "" >> /tmp/narrative.md
            cat bt-flywheel-summary.json >> /tmp/narrative.md
          else
            echo "No narrative or summary generated." > /tmp/narrative.md
          fi

      - name: Decide follow-up action
        id: action
        if: always()
        env:
          ACT_MODE: ${{ inputs.act_mode }}
          HAS_CHANGES: ${{ steps.changes.outputs.has_changes }}
        run: |
          MODE="$ACT_MODE"
          DATE="$(date -u +%Y-%m-%d)"
          SUMMARY="bt-flywheel-summary.json"

          sanitize_title() {
            printf "%s" "$1" | tr '\n\r' ' ' | sed 's/[[:space:]][[:space:]]*/ /g' | cut -c1-120
          }

          RECOMMENDED_TYPES=""
          PRIMARY_PR_TITLE=""
          PRIMARY_ISSUE_TITLE=""
          ISSUE_IDEMPOTENCY_KEY=""

          if [ -f "$SUMMARY" ]; then
            RECOMMENDED_TYPES="$(jq -r '[.recommended_actions[]?.type] | join(",")' "$SUMMARY" 2>/dev/null || true)"
            PRIMARY_PR_TITLE="$(jq -r 'first(.recommended_actions[]? | select(.type == "pull_request") | .title) // empty' "$SUMMARY" 2>/dev/null || true)"
            PRIMARY_ISSUE_TITLE="$(jq -r 'first(.recommended_actions[]? | select(.type == "issue") | .title) // empty' "$SUMMARY" 2>/dev/null || true)"
            ISSUE_IDEMPOTENCY_KEY="$(jq -r 'first(.recommended_actions[]? | select(.type == "issue") | .idempotency_key) // empty' "$SUMMARY" 2>/dev/null || true)"
            jq -r 'first(.recommended_actions[]? | select(.type == "issue") | .body_markdown) // empty' "$SUMMARY" 2>/dev/null > /tmp/recommended-issue.md || true
          fi

          if [ ! -s /tmp/recommended-issue.md ]; then
            cp /tmp/narrative.md /tmp/recommended-issue.md
          fi

          PR_TITLE="$(sanitize_title "${PRIMARY_PR_TITLE:-Flywheel: Agent optimizations (${DATE})}")"
          ISSUE_TITLE="$(sanitize_title "${PRIMARY_ISSUE_TITLE:-Flywheel: Follow-up needed (${DATE})}")"
          SHOULD_PR="false"
          SHOULD_ISSUE="false"

          case "$MODE" in
            none|summary)
              ;;
            pr)
              if [ "$HAS_CHANGES" = "true" ]; then SHOULD_PR="true"; fi
              ;;
            issue)
              SHOULD_ISSUE="true"
              ;;
            auto|"")
              if [ "$HAS_CHANGES" = "true" ] && { [ -z "$RECOMMENDED_TYPES" ] || printf "%s" "$RECOMMENDED_TYPES" | grep -q "pull_request"; }; then
                SHOULD_PR="true"
              fi
              if printf "%s" "$RECOMMENDED_TYPES" | grep -Eq "(^|,)issue(,|$)"; then
                SHOULD_ISSUE="true"
              fi
              ;;
            *)
              echo "Unsupported act_mode '$MODE'. Use auto, pr, issue, summary, or none." >&2
              exit 1
              ;;
          esac

          {
            echo "should_pr=$SHOULD_PR"
            echo "should_issue=$SHOULD_ISSUE"
            echo "pr_title=$PR_TITLE"
            echo "issue_title=$ISSUE_TITLE"
            echo "issue_idempotency_key=$ISSUE_IDEMPOTENCY_KEY"
            echo "recommended_types=$RECOMMENDED_TYPES"
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.action.outputs.should_pr == 'true'
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="flywheel/${DATE}-${GITHUB_RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -m "chore(flywheel): automated agent optimization ${DATE}"
          git push origin "$BRANCH"

          gh pr create \
            --title "$PR_TITLE" \
            --body-file /tmp/narrative.md \
            --base "$BASE_BRANCH" \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ steps.action.outputs.pr_title }}
          BASE_BRANCH: ${{ inputs.base_branch }}

      - name: Create follow-up issue
        if: steps.action.outputs.should_issue == 'true'
        run: |
          KEY="$ISSUE_IDEMPOTENCY_KEY"
          if [ -n "$KEY" ]; then
            EXISTING="$(gh issue list --state open --search "$KEY in:body" --json number --jq '.[0].number // empty')"
            if [ -n "$EXISTING" ]; then
              echo "Open issue #${EXISTING} already contains idempotency key ${KEY}; skipping duplicate."
              exit 0
            fi
            {
              echo ""
              echo "<!-- bt-flywheel-idempotency-key: ${KEY} -->"
            } >> /tmp/recommended-issue.md
          fi
          ISSUE_ARGS=(--title "$ISSUE_TITLE" --body-file /tmp/recommended-issue.md)
          if [ -n "$ISSUE_LABELS" ]; then
            ISSUE_ARGS+=(--label "$ISSUE_LABELS")
          fi
          gh issue create "${ISSUE_ARGS[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ steps.action.outputs.issue_title }}
          ISSUE_IDEMPOTENCY_KEY: ${{ steps.action.outputs.issue_idempotency_key }}
          ISSUE_LABELS: ${{ inputs.issue_labels }}

      - name: Write job summary
        if: always()
        env:
          SHOULD_PR: ${{ steps.action.outputs.should_pr }}
          SHOULD_ISSUE: ${{ steps.action.outputs.should_issue }}
          RECOMMENDED_TYPES: ${{ steps.action.outputs.recommended_types }}
        run: |
          {
            if [ "$SHOULD_PR" = "true" ]; then
              echo "## Flywheel Run — Changes Made"
              echo ""
              echo "A pull request has been opened with the proposed optimizations."
            elif [ "$SHOULD_ISSUE" = "true" ]; then
              echo "## Flywheel Run — Follow-up Issue Created"
            else
              echo "## Flywheel Run — No Follow-up Action Executed"
            fi
            echo ""
            echo "Recommended action types: ${RECOMMENDED_TYPES:-none}"
            echo ""
            cat /tmp/narrative.md 2>/dev/null || echo "No narrative generated."
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flywheel-${{ github.run_id }}
          path: |
            bt-flywheel-summary.json
            bt-flywheel-narrative.md
            flywheel-output.log
          if-no-files-found: ignore
          retention-days: 30
